  <rect x="40" y="40" width="432" height="432" rx="112" fill="url(#bg)" />
  <rect x="40" y="40" width="432" height="432" rx="112" fill="url(#warmGlow)" />

  <circle
    cx="244"
    cy="256"
    r="154"
