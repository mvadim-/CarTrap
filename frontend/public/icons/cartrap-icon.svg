<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">CarTrap app icon</title>
  <desc id="desc">Open Capture Ring symbol on a rounded dark badge.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="76" x2="428" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#223844" />
      <stop offset="0.56" stop-color="#132833" />
      <stop offset="1" stop-color="#0d1d27" />
    </linearGradient>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientTransform="translate(174 128) rotate(46.8) scale(270 238)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f09a55" stop-opacity="0.34" />
      <stop offset="0.5" stop-color="#f09a55" stop-opacity="0.08" />
      <stop offset="1" stop-color="#f09a55" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="target" x1="256" y1="202" x2="256" y2="314" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9783a" />
