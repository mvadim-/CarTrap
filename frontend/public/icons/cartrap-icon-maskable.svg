<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">CarTrap maskable app icon</title>
  <desc id="desc">Open Capture Ring symbol centered on a full-bleed dark background.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="56" x2="444" y2="466" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#223844" />
      <stop offset="0.56" stop-color="#132833" />
      <stop offset="1" stop-color="#0c1a24" />
    </linearGradient>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientTransform="translate(188 126) rotate(47) scale(284 246)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f09a55" stop-opacity="0.38" />
      <stop offset="0.5" stop-color="#f09a55" stop-opacity="0.1" />
      <stop offset="1" stop-color="#f09a55" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="target" x1="256" y1="194" x2="256" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dc7d40" />
      <stop offset="1" stop-color="#bc6227" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)" />
  <rect width="512" height="512" fill="url(#warmGlow)" />

  <circle
    cx="244"
    cy="256"
    r="156"
    fill="none"
    stroke="#f5ead7"
    stroke-linecap="round"
    stroke-width="86"
    stroke-dasharray="816 164"
    transform="rotate(-34 244 256)"
  />
  <circle
    cx="244"
    cy="256"
    r="126"
    fill="none"
    stroke="#dd7f42"
    stroke-linecap="round"
    stroke-width="22"
    stroke-dasharray="124 668"
    transform="rotate(-33 244 256)"
  />
  <rect x="214" y="224" width="92" height="92" rx="30" fill="url(#target)" />
  <circle cx="392" cy="150" r="18" fill="#f5ead7" opacity="0.24" />
</svg>
