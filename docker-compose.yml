services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-cartrap}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-cartrap}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
    volumes:
      - ./backend/keys:/app/backend/keys:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - mongodb

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m cartrap.worker.main
    env_file:
      - .env
    volumes:
      - ./backend/keys:/app/backend/keys:ro
    depends_on:
      - mongodb

  copart-gateway:
    profiles: ["gateway"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_MODULE: cartrap.gateway_app:app
      PORT: 8010
    ports:
      - "${COPART_GATEWAY_PORT:-8010}:8010"

  iaai-gateway:
    profiles: ["gateway"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_MODULE: cartrap.iaai_gateway_app:app
      PORT: 8020
    ports:
      - "${IAAI_GATEWAY_PORT:-8020}:8020"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "${FRONTEND_PORT:-5173}:4173"
    depends_on:
      - backend

volumes:
  mongodb_data:
