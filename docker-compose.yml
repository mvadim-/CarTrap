version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-cartrap}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-cartrap}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e ./backend && uvicorn cartrap.main:app --host ${BACKEND_HOST:-0.0.0.0} --port ${BACKEND_PORT:-8000}"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend/src
    volumes:
      - .:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - mongodb

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e ./backend && python -m cartrap.worker_placeholder"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend/src
    volumes:
      - .:/app
    depends_on:
      - mongodb

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    volumes:
      - .:/app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  mongodb_data:
